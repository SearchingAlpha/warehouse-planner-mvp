# Example: Logista Madrid warehouse
client_name: "FC 1 - MAD6"

active_flows:
  - outbound
  - inbound

productivity_inbound: 53.3
productivity_outbound: 18.3

hours_per_shift: 8
overhead_buffer: 0.15

backlog_threshold_watch: 1.0
backlog_threshold_critical: 2.0

initial_backlog_outbound: 3500
initial_backlog_inbound: 1200

target_backlog_ratio: 0.35
# Per-rotation current staffing (must match shift_patterns order)
current_staffing_outbound: [110, 100]    # early: 70, central: 50
current_staffing_inbound: [90, 90]     # early: 60, central: 40

# Shift rotations: each rotation has a fixed headcount per week.
# days: 0=Monday, 1=Tuesday, ..., 6=Sunday
shift_patterns:
  - name: "early"
    days: [0, 1, 2, 3]      # Mon-Thu
  - name: "central"
    days: [2, 3, 4, 5]      # Wed-Sat

language: "es"
forecast_horizon: 28
cost_per_hour: 12.50
